<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Submission Test - Sparklebots</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0b3c5d 0%, #0fa3b1 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            border-radius: 10px;
            padding: 30px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #0b3c5d;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #0fa3b1;
            box-shadow: 0 0 5px rgba(15, 163, 177, 0.3);
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #0fa3b1 0%, #0b3c5d 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .console {
            margin-top: 20px;
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }

        .console-line {
            margin-bottom: 5px;
            padding: 5px;
            border-radius: 3px;
        }

        .log {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .error {
            background: #ffebee;
            color: #c62828;
        }

        .info {
            background: #e3f2fd;
            color: #1565c0;
        }

        .success {
            background: #c8e6c9;
            color: #1b5e20;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 Form Submission Test</h1>
        <p class="subtitle">Test your enrollment form with the Google Form</p>

        <form id="testForm">
            <div class="form-group">
                <label for="child">Child's Name *</label>
                <input type="text" id="child" name="child" placeholder="Enter child's name" required>
            </div>

            <div class="form-group">
                <label for="parent">Parent's Name *</label>
                <input type="text" id="parent" name="parent" placeholder="Enter parent's name" required>
            </div>

            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number *</label>
                <input type="tel" id="phone" name="phone" placeholder="Enter your phone" required>
            </div>

            <div class="form-group">
                <label for="age">Age Group *</label>
                <select id="age" name="age" required>
                    <option value="">Select Age Group</option>
                    <option value="6 - 10 yrs">6 - 10 Years</option>
                    <option value="10 - 14 yrs">10 - 14 Years</option>
                    <option value="14 - 20 yrs">14 - 20 Years</option>
                </select>
            </div>

            <div class="form-group">
                <label for="course">Course *</label>
                <select id="course" name="course" required>
                    <option value="">Select Course</option>
                    <option value="Robotics basis FREE demo">Robotics basis FREE demo</option>
                    <option value="RoboCHAMP Robotics Course">RoboCHAMP Robotics Course</option>
                    <option value="Adv RoboCHAMP Robotics Course">Adv RoboCHAMP Robotics Course</option>
                    <option value="Arduino Robotics Development">Arduino Robotics Development</option>
                    <option value="Core Python Programming">Core Python Programming</option>
                </select>
            </div>

            <button type="submit">Submit Test Form</button>
        </form>

        <div class="console">
            <div class="console-line info">🔍 Console Output (watch here for logs):</div>
            <div id="output"></div>
        </div>
    </div>

    <script>
        const outputDiv = document.getElementById('output');

        function addLog(message, type = 'log') {
            const line = document.createElement('div');
            line.className = `console-line ${type}`;
            line.textContent = message;
            outputDiv.appendChild(line);
            outputDiv.scrollTop = outputDiv.scrollHeight;
            console.log(message);
        }

        document.getElementById('testForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            addLog('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'info');
            addLog('Starting form submission test...', 'info');

            const child = document.getElementById('child').value.trim();
            const parent = document.getElementById('parent').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const age = document.getElementById('age').value;
            const course = document.getElementById('course').value;

            addLog(`📋 Child Name: ${child}`, 'log');
            addLog(`📋 Parent Name: ${parent}`, 'log');
            addLog(`📋 Email: ${email}`, 'log');
            addLog(`📋 Phone: ${phone}`, 'log');
            addLog(`📋 Age: ${age}`, 'log');
            addLog(`📋 Course: ${course}`, 'log');

            const formData = { child, parent, email, phone, age, course };
            addLog(`📤 Sending data to /submit-enroll endpoint...`, 'info');

            try {
                const response = await fetch('/submit-enroll', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });

                addLog(`📊 Response Status: ${response.status}`, 'log');
                const data = await response.json();
                addLog(`✅ Server Response: ${JSON.stringify(data)}`, 'success');
                addLog('✅ Form submission test completed!', 'success');
            } catch (error) {
                addLog(`❌ Error: ${error.message}`, 'error');
                addLog(`❌ Check the Python server console for connection issues`, 'error');
            }
        });

        // Log when page loads
        window.addEventListener('load', () => {
            addLog('✅ Test page loaded successfully', 'success');
            addLog('Make sure Python server is running at http://localhost:3000', 'info');
            addLog('Fill out the form and click Submit to test the connection', 'log');
        });
    </script>
</body>
</html>
